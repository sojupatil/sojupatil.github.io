<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/sg.css">
    <title>Hymn For The Weekend</title>
</head>

<body>
    <audio id="source" preload="auto" headers="Cache-Control: public, max-age=31536000">
        <source
            src="https://archive.org/download/songp1/Imagine%20Dragons%20-%20Believer%20%28Official%20Music%20Video%29.mp3"
            type="audio/mpeg">
    </audio>

    <div class="playerctrl">
        <h3>Imagine Dragons - Believer (Official Music Video)</h3>
        <img src="https://i.ytimg.com/vi/7wtfhZwyrcc/hq720.jpg" alt="" class="bannerimage">
        <input title="RANGE" type="range" id="seekslider" min="0" value="0">
        <div class="time1">
            <span id="curtimetext">00:00</span>
            <button title="playpausebtn" id="playpause">PLAY</button>
            <span id="durtimetext">00:00</span>
        </div>
    </div>

    <div id="content"></div>

    <script src="../js/sg.js"></script>
    <script>
        fetch('../files/content.html')
            .then(response => response.text())
            .then(html => {
                document.querySelector('#content').innerHTML += html;
            });
    </script>
</body>

</html>
